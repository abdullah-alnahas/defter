<!doctype html>
<html lang="%LANG%" dir="%DIR%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <script>(function(){try{var t=localStorage.getItem('defter-theme');if(t!=='light'&&t!=='dark')t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.dataset.theme=t;var n=localStorage.getItem('defter-theme-name');if(n==='paper'||n==='sepia')document.documentElement.dataset.themeName=n;}catch(e){document.documentElement.dataset.theme='light';}})();</script>
    <script>document.addEventListener('click',function(e){var a=e.target.closest&&e.target.closest('.fn-anchor a[data-footnote-ref]');if(!a)return;e.preventDefault();a.closest('.fn-anchor').classList.toggle('pinned');});document.addEventListener('keydown',function(e){if(e.key==='Escape')document.querySelectorAll('.fn-anchor.pinned').forEach(function(el){el.classList.remove('pinned');});});</script>
    <title>%TITLE%</title>
    <meta name="description" content="%DESCRIPTION%" />
    <link rel="canonical" href="%CANONICAL%" />
    <link rel="alternate" type="application/rss+xml" title="defter — RSS" href="/rss.xml" />
    <link rel="preload" href="/fonts/UthmanTN-Arabic.woff2" as="font" type="font/woff2" crossorigin />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="%TITLE%" />
    <meta property="og:description" content="%DESCRIPTION%" />
    <meta property="og:url" content="%CANONICAL%" />
    <meta name="twitter:card" content="summary" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app"><!--ssr-outlet--></div>
    <script>window.__DEFTER__=%DATA%;</script>
  </body>
</html>
